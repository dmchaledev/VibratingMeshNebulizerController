name: Firmware Static Analysis & Tests

on:
  push:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-check.yml'
  pull_request:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-check.yml'

jobs:
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run static analysis
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            --inline-suppr \
            --quiet \
            firmware/src/

  unit-tests:
    name: Host-side unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run firmware unit tests
        run: make -C firmware/tests
