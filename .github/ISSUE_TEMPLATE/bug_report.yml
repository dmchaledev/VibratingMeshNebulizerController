name: Bug report
description: Something isn't working as documented (firmware, hardware, build, docs)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **If this is a safety hazard** (e.g.
        uncontrolled boost output, no battery cutoff, runaway treatment timer)
        please report it privately via the link in our security policy
        instead — see [SECURITY.md](../blob/main/SECURITY.md).

  - type: input
    id: firmware_version
    attributes:
      label: Firmware version
      description: From the splash screen or `FIRMWARE_VERSION` in `firmware/src/config.h`.
      placeholder: "v3.1"
    validations:
      required: true

  - type: dropdown
    id: hardware_rev
    attributes:
      label: Hardware revision
      options:
        - Breadboard prototype
        - JLCPCB v3.0
        - JLCPCB v3.1
        - Other (describe below)
    validations:
      required: true

  - type: dropdown
    id: boost_mode
    attributes:
      label: Boost mode
      description: Set in `config.h` as `BOOST_MODE`.
      options:
        - MODULE (pre-built MT3608/XL6009)
        - DISCRETE (on-board boost)
    validations:
      required: true

  - type: input
    id: cup
    attributes:
      label: Cup brand and model
      placeholder: "Aerogen Solo"
    validations:
      required: true

  - type: input
    id: programmer
    attributes:
      label: Programmer
      placeholder: "MPLAB Snap / PICkit 4 / PICkit 5"

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps from a known starting state.
      placeholder: |
        1. Power on the controller
        2. Press the button to start a treatment
        3. ...
    validations:
      required: true

  - type: textarea
    id: serial
    attributes:
      label: Serial debug output
      description: |
        If you have `UART_ENABLED = 1` in `config.h`, paste the relevant log.
        Include the lines around the failure, not just the error.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Photos, scope traces, multimeter readings, modifications.
